<div class="p-6 bg-slate-900 min-h-screen text-slate-100 font-sans">
  <!-- Header -->
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-6">
    <div class="animate-in fade-in slide-in-from-left-4 duration-700">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/40">
          <i class="bi bi-rocket-takeoff-fill text-2xl"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">
          DevOps Control Panel
        </h1>
      </div>
      <p class="text-slate-400 text-lg flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        Infrastructure Orchestration & Live Monitoring
      </p>
    </div>
    
    <div class="flex gap-3 animate-in fade-in slide-in-from-right-4 duration-700">
      <button [routerLink]="['./host-terminal']" 
              routerLinkActive="ring-2 ring-indigo-500 bg-indigo-600/20"
              class="group bg-slate-800 hover:bg-slate-700 text-slate-300 px-5 py-3 rounded-xl border border-slate-700 transition-all flex items-center gap-2 hover:scale-105 active:scale-95 shadow-xl">
        <i class="bi bi-terminal-fill text-indigo-400"></i> 
        <span>Host Console</span>
      </button>
      <button class="group bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-xl border border-slate-700 transition-all flex items-center gap-2 hover:scale-105 active:scale-95 shadow-xl">
        <i class="bi bi-arrow-clockwise group-hover:rotate-180 transition-transform duration-500 text-indigo-400"></i> 
        <span>Refresh</span>
      </button>
    </div>
  </header>

  <!-- NAVIGATION TABS -->
  <nav class="flex gap-6 mb-10 border-b border-slate-800 animate-in fade-in slide-in-from-bottom-2 duration-700 delay-100">
    <a [routerLink]="['./infrastructure']" 
       routerLinkActive="text-indigo-400 border-indigo-400"
       class="pb-4 px-2 text-sm font-bold uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-200 transition-all cursor-pointer">
      <i class="bi bi-box-seam mr-2"></i> Infrastructure
    </a>
    <a [routerLink]="['./deployments']" 
       routerLinkActive="text-indigo-400 border-indigo-400"
       class="pb-4 px-2 text-sm font-bold uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-200 transition-all cursor-pointer">
      <i class="bi bi-git mr-2"></i> Deployments
    </a>
  </nav>

  <!-- MAIN DASHBOARD CONTENT -->
  <div class="animate-in fade-in slide-in-from-right-10 duration-1000">
    <!-- Clean Outlet for sub-pages (Infrastructure, DeploymentManager) -->
    <router-outlet></router-outlet>
  </div>
</div>
