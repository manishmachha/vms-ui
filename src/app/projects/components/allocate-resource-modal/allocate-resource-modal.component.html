<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-xl font-bold text-gray-900 border-l-4 border-indigo-500 pl-3">Allocate Resource</h3>
    <button mat-icon-button (click)="onClose()" class="text-gray-400 hover:text-gray-600">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="allocateForm" (ngSubmit)="allocateUser()" class="space-y-5">
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Select Candidate</label>
      <div class="relative group">
        <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-indigo-400! group-focus-within:text-indigo-600! transition-colors">person_add</mat-icon>
        <select
          formControlName="candidateId"
          class="input-modern pl-12 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
        >
          <option value="">Choose a candidate...</option>
          <option *ngFor="let candidate of candidates()" [value]="candidate.id">
            {{ candidate.firstName }} {{ candidate.lastName }}
          </option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Billing Role</label>
      <div class="relative group">
        <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-indigo-400! group-focus-within:text-indigo-600! transition-colors">badge</mat-icon>
        <input
          formControlName="billingRole"
          placeholder="e.g. Senior Frontend Developer"
          class="input-modern pl-12 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
        />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Start Date</label>
        <div class="relative group">
          <input
            type="date"
            formControlName="startDate"
            class="input-modern pl-12 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
          />
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-2 px-1">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Allocation %</label>
        </div>
        <div class="relative group">
          <input
            type="number"
            formControlName="percentage"
            min="0"
            max="100"
            class="input-modern bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 pr-10"
          />
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
            <span class="text-gray-400 font-bold">%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="pt-6 flex justify-end gap-3 border-t border-gray-50">
      <button
        type="button"
        (click)="onClose()"
        class="px-6 py-2.5 rounded-xl border border-gray-200 text-gray-700 hover:bg-gray-50 font-semibold transition-all"
      >
        Discard
      </button>
      <button
        type="submit"
        [disabled]="allocateForm.invalid"
        class="px-8 py-2.5 bg-linear-to-r from-indigo-600 to-indigo-700 text-white rounded-xl hover:from-indigo-700 hover:to-indigo-800 font-bold transition-all shadow-lg shadow-indigo-200 disabled:opacity-50 disabled:shadow-none"
      >
        Confirm Allocation
      </button>
    </div>
  </form>
</div>
